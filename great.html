<!DOCTYPE html>
<html>
    <title>Student Grade Calculator</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            margin-top: 15px;
            padding: 10px 25px;
            border-radius: 25px;
            border: none;
            background: #00c6ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0072ff;
            transform: scale(1.05);
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            text-align: left;
            line-height: 1.6;
            display: none;
        }

        .highlight {
            color: #00e6ff;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🎓 Grade Calculator</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="number" id="s1" placeholder="Subject 1">
    <input type="number" id="s2" placeholder="Subject 2">
    <input type="number" id="s3" placeholder="Subject 3">
    <input type="number" id="s4" placeholder="Subject 4">
    <input type="number" id="s5" placeholder="Subject 5">

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>
</div>

<script src="great.js"></script>

</body>
</html>
